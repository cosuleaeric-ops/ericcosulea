<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blocked by Deep Work</title>
  <style>
    :root {
      --bg: #fffdf7;
      --card: #fdfaf5;
      --border: #e7ddce;
      --text: #1c1c1c;
      --muted: #6d6a64;
      --accent: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Georgia", serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      font-weight: 400;
      text-transform: lowercase;
    }

    p {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.5;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid #d9d0c2;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>back to deep work.</h1>
    <p id="message">Site-ul acesta este blocat cât timp rulează sesiunea de work.</p>
    <p><a href="https://ericcosulea.ro/deep-work/">înapoi la timer</a></p>
  </main>
  <script src="blocked.js"></script>
</body>
</html>
