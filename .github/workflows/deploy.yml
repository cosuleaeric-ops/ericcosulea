name: Deploy to Hostico

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate admin/config.php from secret
        env:
          BCRYPT_HASH: ${{ secrets.ADMIN_PASSWORD_BCRYPT }}
        run: |
          python3 << 'EOF'
          import os
          h = os.environ['BCRYPT_HASH']
          content = "<?php\nreturn [\n    'password_bcrypt' => '" + h + "',\n];\n"
          with open('admin/config.php', 'w') as f:
              f.write(content)
          print("admin/config.php generated OK")
          EOF

      - name: Deploy files to Hostico over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTICO_FTP_SERVER }}
          username: ${{ secrets.HOSTICO_FTP_USERNAME }}
          password: ${{ secrets.HOSTICO_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            **/.claude/**
            .claude/**
            Archive.zip
            data/blog.sqlite
            pnlcursuri/data/*.sqlite
            pnlpersonal/data/*.sqlite
            uploads/inspo/**
