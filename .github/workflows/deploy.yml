name: Deploy to Hostico

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy files to Hostico over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTICO_FTP_SERVER }}
          username: ${{ secrets.HOSTICO_FTP_USERNAME }}
          password: ${{ secrets.HOSTICO_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            Archive.zip
            data/blog.sqlite
            pnlcursuri/data/*.sqlite
            uploads/inspo/**
